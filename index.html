<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Riley AI</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:#e2e8f0;
display:flex;
flex-direction:column;
height:100vh;
}

#topbar{
background:#020617;
padding:12px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #1e293b;
}

#title{
font-weight:600;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
max-width:900px;
line-height:1.6;
}

.user{
align-self:flex-end;
background:#1e293b;
padding:10px 14px;
border-radius:8px;
}

.ai{
align-self:flex-start;
background:#020617;
border:1px solid #1e293b;
padding:12px 16px;
border-radius:8px;
}

pre{
background:#020617;
padding:14px;
border-radius:6px;
border:1px solid #1e293b;
overflow:auto;
}

code{
font-family:monospace;
}

#inputbar{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #1e293b;
background:#020617;
}

textarea{
flex:1;
resize:none;
height:60px;
background:#020617;
border:1px solid #1e293b;
color:#e2e8f0;
padding:10px;
border-radius:6px;
}

button{
background:#2563eb;
border:none;
padding:10px 16px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div id="topbar">
<div id="title">Riley AI</div>
</div>

<div id="chat"></div>

<div id="inputbar">
<textarea id="prompt"></textarea>
<button onclick="send()">Send</button>
</div>

<script>

let API_KEY=""
let history=[]
let abortCtrl=null

function addMessage(text,role){

const chat=document.getElementById("chat")

const msg=document.createElement("div")
msg.className="msg "+role
msg.innerHTML=format(text)

chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight
}

function format(t){

t=t.replace(/```([\s\S]*?)```/g,(m,p)=>{
return "<pre>"+escapeHtml(p)+"</pre>"
})

return t
}

function escapeHtml(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}
  async function send(){

const prompt=document.getElementById("prompt").value.trim()

if(!prompt)return

document.getElementById("prompt").value=""

addMessage(prompt,"user")

history.push({
role:"user",
parts:[{text:prompt}]
})

const thinking=document.createElement("div")
thinking.className="msg ai"
thinking.innerHTML="Thinking..."
document.getElementById("chat").appendChild(thinking)

abortCtrl=new AbortController()

try{

const body={
contents:history,
generationConfig:{
temperature:0.7,
maxOutputTokens:8192
}
}

const res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
signal:abortCtrl.signal,
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
}
)

const data=await res.json()

thinking.remove()

if(data.error){
addMessage("Error: "+data.error.message,"ai")
return
}

let text=data.candidates?.[0]?.content?.parts
?.map(p=>p.text)
.join("") || ""

history.push({
role:"model",
parts:[{text}]
})

addMessage(text,"ai")

}catch(err){

thinking.remove()
addMessage("Request failed: "+err.message,"ai")

}

}
  window.onload=()=>{

API_KEY=localStorage.getItem("gemini_key")||""

if(!API_KEY){

API_KEY=prompt(
"Enter your Gemini API key.\n\nGet one from:\nhttps://aistudio.google.com/app/apikey"
)

localStorage.setItem("gemini_key",API_KEY)

}

}

</script>
</body>
</html>
