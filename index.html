<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riley AI – Gemini Code Generator</title>

<style>
body{
background:#0b0f17;
color:#e6f1ff;
font-family:system-ui,Segoe UI,Roboto;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

#topbar{
background:#111827;
padding:10px 16px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #1f2937;
}

#title{
font-weight:600;
color:#60a5fa;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.msg{
max-width:900px;
line-height:1.6;
}

.user{
align-self:flex-end;
background:#1f2937;
padding:10px 14px;
border-radius:8px;
}

.ai{
align-self:flex-start;
background:#111827;
padding:12px 16px;
border-radius:8px;
border:1px solid #1f2937;
}

code{
background:#020617;
padding:3px 6px;
border-radius:4px;
font-family:monospace;
}

pre{
background:#020617;
padding:14px;
border-radius:6px;
overflow:auto;
border:1px solid #1f2937;
}

#inputbar{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #1f2937;
background:#020617;
}

textarea{
flex:1;
resize:none;
height:60px;
background:#020617;
border:1px solid #1f2937;
color:#e6f1ff;
padding:10px;
border-radius:6px;
}

button{
background:#2563eb;
border:none;
padding:10px 16px;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#apikeymodal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
}

#apikeybox{
background:#020617;
padding:30px;
border-radius:10px;
width:420px;
}

#apikeybox input{
width:100%;
padding:10px;
margin-top:10px;
background:#020617;
border:1px solid #1f2937;
color:white;
border-radius:6px;
}
</style>
</head>

<body>

<div id="topbar">
<div id="title">Riley AI – Gemini Code Generator</div>
</div>

<div id="chat"></div>

<div id="inputbar">
<textarea id="prompt" placeholder="Ask for code, explanations, apps..."></textarea>
<button onclick="send()">Send</button>
</div>

<div id="apikeymodal">
<div id="apikeybox">
<h3>Enter Gemini API Key</h3>
<p>Get a free key at:</p>
<p>https://aistudio.google.com/app/apikey</p>
<input id="apikey" placeholder="Paste API key here"/>
<button onclick="saveKey()">Save</button>
</div>
</div>

<script>

let API_KEY = localStorage.getItem("gemini_key") || ""
let history = []

if(API_KEY){
document.getElementById("apikeymodal").style.display="none"
}

function saveKey(){
API_KEY = document.getElementById("apikey").value.trim()
localStorage.setItem("gemini_key",API_KEY)
document.getElementById("apikeymodal").style.display="none"
}

function addMessage(text,role){

const chat=document.getElementById("chat")

const msg=document.createElement("div")
msg.className="msg "+role
msg.innerHTML=format(text)

chat.appendChild(msg)
chat.scrollTop=chat.scrollHeight
}

function format(t){

t=t.replace(/```([\s\S]*?)```/g,(m,p)=>{
return "<pre>"+escapeHtml(p)+"</pre>"
})

return t
}

function escapeHtml(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
}

async function send(){

const prompt=document.getElementById("prompt").value.trim()
if(!prompt) return

document.getElementById("prompt").value=""

addMessage(prompt,"user")

history.push({
role:"user",
parts:[{text:prompt}]
})

const thinking=document.createElement("div")
thinking.className="msg ai"
thinking.innerHTML="Thinking..."
document.getElementById("chat").appendChild(thinking)

const body={
contents:history,
generationConfig:{
temperature:0.7,
maxOutputTokens:8192
}
}

try{

const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
}
)

const data=await res.json()

thinking.remove()

if(data.error){
addMessage("Error: "+data.error.message,"ai")
return
}

let text=data.candidates?.[0]?.content?.parts
?.map(p=>p.text)
.join("") || "No response."

history.push({
role:"model",
parts:[{text}]
})

addMessage(text,"ai")

}catch(err){

thinking.remove()
addMessage("Request failed: "+err.message,"ai")

}

}

</script>
</body>
</html>
